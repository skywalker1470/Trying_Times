<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Assign Task to Zone and Team</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    select, input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
    }
    button:hover {
      background: #0056b3;
    }
    #message {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Assign Task to Zone and Team</h2>
  <form id="assignForm">
    <label for="zoneSelect">Select Zone:</label>
    <select id="zoneSelect" required>
      <option value="">Loading zones...</option>
    </select>

    <label for="teamSelect">Select Team:</label>
    <select id="teamSelect" required>
      <option value="">Loading teams...</option>
    </select>

    <label for="taskInput">Task:</label>
    <input type="text" id="taskInput" placeholder="Enter task" required />

    <button type="submit">Assign Task</button>
  </form>

  <div id="message"></div>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    async function loadZones() {
      try {
        const res = await fetch(`${API_BASE}/zones`);
        const zones = await res.json();
        const zoneSelect = document.getElementById('zoneSelect');
        zoneSelect.innerHTML = '<option value="">-- Select a Zone --</option>';
        zones.forEach(zone => {
          const option = document.createElement('option');
          option.value = zone.name;  // zone.name comes from officeName in your backend
          option.textContent = zone.name;
          zoneSelect.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to load zones:', err);
        document.getElementById('message').textContent = 'Failed to load zones';
      }
    }

    async function loadTeams() {
      try {
        const res = await fetch(`${API_BASE}/teams`);
        const teams = await res.json();
        const teamSelect = document.getElementById('teamSelect');
        teamSelect.innerHTML = '<option value="">-- Select a Team --</option>';
        teams.forEach(team => {
          const option = document.createElement('option');
          option.value = team._id;
          option.textContent = team.name;
          teamSelect.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to load teams:', err);
        document.getElementById('message').textContent = 'Failed to load teams';
      }
    }

    document.getElementById('assignForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const zoneName = document.getElementById('zoneSelect').value;
      const teamId = document.getElementById('teamSelect').value;
      const task = document.getElementById('taskInput').value.trim();
      const messageDiv = document.getElementById('message');

      if (!zoneName || !teamId || !task) {
        messageDiv.textContent = 'Please select a zone, a team, and enter a task.';
        messageDiv.style.color = 'red';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/zones`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: zoneName,
            team: teamId,
            task: task
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to assign task');
        }

        messageDiv.textContent = 'Task assigned successfully!';
        messageDiv.style.color = 'green';
        e.target.reset();
      } catch (err) {
        console.error('Error assigning task:', err);
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.style.color = 'red';
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      loadZones();
      loadTeams();
    });
  </script>
</body>
</html>
